server {
    listen 80;
    listen [::]:80;
    server_name panel.ipping.ir;

    # Redirect all HTTP requests to HTTPS
    if ($host = panel.ipping.ir) {
        return 301 https://$host$request_uri;
    }
    return 404;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name panel.ipping.ir;

    ssl_certificate /etc/letsencrypt/live/panel.ipping.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.ipping.ir/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Increase maximum client body size for file transfers
    client_max_body_size 10M;

    # Client WebApp & API Reverse Proxy
    location / {
        proxy_pass http://127.0.0.1:8000;
        
        # Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSockets support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout 90s;
        proxy_send_timeout 60s;
    }

    # WebSocket SSH Tunnel Daemon Reverse Proxy
    location /vpn {
        proxy_pass http://127.0.0.1:8745;
        
        # Enable WebSocket protocol upgrade
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Propagate the real client IP to the local daemon
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;

        # Set generous timeouts for persistent WebSocket tunnels
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        
        # Disable buffering to avoid latency for active tunnel connections
        proxy_buffering off;
    }
}
